name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - "v*"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Package
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Package backend
        run: mvn -B -pl xiaou-application -am clean package -DskipTests

      - name: Upload backend jar
        uses: actions/upload-artifact@v4
        with:
          name: code-nest-backend-jar
          path: xiaou-application/target/xiaou-application-*.jar
          if-no-files-found: error

  frontend:
    name: Frontend Builds
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        app:
          - name: admin
            path: vue3-admin-front
          - name: user
            path: vue3-user-front

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ matrix.app.path }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.app.path }}

      - name: Build
        run: npm run build
        working-directory: ${{ matrix.app.path }}

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: code-nest-${{ matrix.app.name }}-dist
          path: ${{ matrix.app.path }}/dist
          if-no-files-found: error

  docs:
    name: Docs Site Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: docs-site

      - name: Build docs site
        run: npm run build
        working-directory: docs-site

      - name: Upload docs site
        uses: actions/upload-artifact@v4
        with:
          name: code-nest-docs-site
          path: docs-site/.vitepress/dist
          if-no-files-found: error

  scripts:
    name: Script Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python syntax check
        run: python -m py_compile scripts/deploy-frontends.py scripts/you_deserve_to_interview_sql.py

      - name: Shell syntax check
        run: bash -n scripts/deploy-release.sh

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
      - docs
      - scripts
    if: always()

    steps:
      - name: Fail if required jobs failed
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          echo "$NEEDS_JSON" | jq -e 'all(.[]; .result == "success")' >/dev/null
          echo "CI passed"
