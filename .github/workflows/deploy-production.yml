name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit to deploy"
        required: false
        default: ""
      reload_nginx:
        description: "Reload nginx after static asset replacement"
        required: true
        type: boolean
        default: true
  push:
    branches:
      - "v*"
    tags:
      - "v*"

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-release:
    name: Build Release Bundle
    runs-on: ubuntu-latest
    timeout-minutes: 35

    outputs:
      release_version: ${{ steps.meta.outputs.release_version }}
      bundle_name: ${{ steps.package.outputs.bundle_name }}

    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Resolve release metadata
        id: meta
        env:
          REQUESTED_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || '' }}
        run: |
          release_version="${REQUESTED_REF:-$GITHUB_REF_NAME}"
          release_version="${release_version//\//-}"
          release_version="$(printf '%s' "$release_version" | sed 's/[^A-Za-z0-9._-]/-/g')"
          if [[ -z "$release_version" ]]; then
            release_version="manual"
          fi
          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            vue3-admin-front/package-lock.json
            vue3-user-front/package-lock.json

      - name: Package backend
        run: mvn -B -pl xiaou-application -am clean package -DskipTests

      - name: Install admin dependencies
        run: npm ci
        working-directory: vue3-admin-front

      - name: Build admin frontend
        run: npm run build
        working-directory: vue3-admin-front

      - name: Install user dependencies
        run: npm ci
        working-directory: vue3-user-front

      - name: Build user frontend
        run: npm run build
        working-directory: vue3-user-front

      - name: Assemble release bundle
        id: package
        run: |
          set -euo pipefail
          bundle_name="code-nest-${{ steps.meta.outputs.release_version }}-${GITHUB_SHA::7}.tar.gz"
          rm -rf release-bundle
          mkdir -p release-bundle/backend release-bundle/admin release-bundle/user release-bundle/scripts
          cp xiaou-application/target/xiaou-application-*.jar release-bundle/backend/app.jar
          cp -a vue3-admin-front/dist/. release-bundle/admin/
          cp -a vue3-user-front/dist/. release-bundle/user/
          cp scripts/deploy-release.sh release-bundle/scripts/deploy-release.sh
          chmod 755 release-bundle/scripts/deploy-release.sh
          cat > release-bundle/RELEASE <<EOF
          version=${{ steps.meta.outputs.release_version }}
          sha=$GITHUB_SHA
          built_at=$(date -Iseconds)
          EOF
          tar -czf "$bundle_name" -C release-bundle .
          echo "bundle_name=$bundle_name" >> "$GITHUB_OUTPUT"

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: code-nest-release-bundle
          path: ${{ steps.package.outputs.bundle_name }}
          if-no-files-found: error
          retention-days: 14

  deploy:
    name: Deploy To Production
    runs-on: ubuntu-latest
    needs: build-release
    timeout-minutes: 15
    environment: production

    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: code-nest-release-bundle
          path: release

      - name: Configure SSH
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.CODE_NEST_DEPLOY_SSH_KEY }}" > ~/.ssh/code_nest_deploy
          chmod 600 ~/.ssh/code_nest_deploy
          ssh-keyscan -p "${{ secrets.CODE_NEST_DEPLOY_PORT || '22' }}" "${{ secrets.CODE_NEST_DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload release bundle
        run: |
          set -euo pipefail
          bundle="release/${{ needs.build-release.outputs.bundle_name }}"
          remote_bundle="/tmp/${{ needs.build-release.outputs.bundle_name }}"
          scp -i ~/.ssh/code_nest_deploy \
            -P "${{ secrets.CODE_NEST_DEPLOY_PORT || '22' }}" \
            "$bundle" \
            "${{ secrets.CODE_NEST_DEPLOY_USER }}@${{ secrets.CODE_NEST_DEPLOY_HOST }}:$remote_bundle"

      - name: Deploy on server
        run: |
          set -euo pipefail
          remote_bundle="/tmp/${{ needs.build-release.outputs.bundle_name }}"
          reload_nginx="${{ github.event_name == 'workflow_dispatch' && format('{0}', inputs.reload_nginx) || 'true' }}"
          ssh -i ~/.ssh/code_nest_deploy \
            -p "${{ secrets.CODE_NEST_DEPLOY_PORT || '22' }}" \
            "${{ secrets.CODE_NEST_DEPLOY_USER }}@${{ secrets.CODE_NEST_DEPLOY_HOST }}" \
            "CODE_NEST_RELEASE_VERSION='${{ needs.build-release.outputs.release_version }}' CODE_NEST_RELOAD_NGINX='$reload_nginx' bash -s deploy '$remote_bundle'" \
            < scripts/deploy-release.sh

      - name: Deployment summary
        run: |
          echo "Deployed ${{ needs.build-release.outputs.release_version }} to production"
